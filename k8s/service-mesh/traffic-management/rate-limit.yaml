apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: recommendation-rate-limit
  namespace: hipster-shop
spec:
  host: recommendationservice
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 20
      http:
        http1MaxPendingRequests: 10
        maxRequestsPerConnection: 5
        http2MaxRequests: 50
