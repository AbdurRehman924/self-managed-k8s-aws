apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: velero
spec:
  selector:
    matchLabels:
      name: node-agent
  template:
    metadata:
      labels:
        name: node-agent
    spec:
      serviceAccountName: velero
      containers:
      - name: node-agent
        image: velero/velero:v1.13.0
        command:
        - /velero
        args:
        - node-agent
        - server
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: VELERO_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: VELERO_SCRATCH_DIR
          value: /scratch
        - name: LD_LIBRARY_PATH
          value: /plugins
        volumeMounts:
        - name: host-pods
          mountPath: /host_pods
          mountPropagation: HostToContainer
        - name: scratch
          mountPath: /scratch
        - name: plugins
          mountPath: /plugins
      initContainers:
      - name: velero-plugin-for-azure
        image: velero/velero-plugin-for-microsoft-azure:v1.9.0
        volumeMounts:
        - name: plugins
          mountPath: /target
      volumes:
      - name: host-pods
        hostPath:
          path: /var/lib/kubelet/pods
      - name: scratch
        emptyDir: {}
      - name: plugins
        emptyDir: {}
