apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  hipster-shop-logs.json: |
    {
      "dashboard": {
        "title": "Hipster Shop Logs",
        "tags": ["logging", "loki"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Log Volume by Service",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
            "targets": [
              {
                "expr": "sum by (pod) (rate({namespace=\"hipster-shop\"}[1m]))",
                "refId": "A",
                "datasource": {"type": "loki", "uid": "loki"}
              }
            ],
            "options": {
              "legend": {"displayMode": "table", "placement": "right"}
            }
          },
          {
            "id": 2,
            "title": "Error Rate",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
            "targets": [
              {
                "expr": "sum(rate({namespace=\"hipster-shop\"} |~ \"(?i)error\" [5m]))",
                "refId": "A",
                "datasource": {"type": "loki", "uid": "loki"}
              }
            ],
            "options": {
              "colorMode": "background",
              "graphMode": "area"
            },
            "fieldConfig": {
              "defaults": {
                "unit": "logs/s",
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 0.1, "color": "yellow"},
                    {"value": 1, "color": "red"}
                  ]
                }
              }
            }
          },
          {
            "id": 3,
            "title": "Warning Rate",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
            "targets": [
              {
                "expr": "sum(rate({namespace=\"hipster-shop\"} |~ \"(?i)warn\" [5m]))",
                "refId": "A",
                "datasource": {"type": "loki", "uid": "loki"}
              }
            ],
            "options": {
              "colorMode": "background",
              "graphMode": "area"
            },
            "fieldConfig": {
              "defaults": {
                "unit": "logs/s",
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 0.5, "color": "yellow"},
                    {"value": 2, "color": "orange"}
                  ]
                }
              }
            }
          },
          {
            "id": 4,
            "title": "Total Log Rate",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
            "targets": [
              {
                "expr": "sum(rate({namespace=\"hipster-shop\"}[5m]))",
                "refId": "A",
                "datasource": {"type": "loki", "uid": "loki"}
              }
            ],
            "options": {
              "colorMode": "value",
              "graphMode": "area"
            },
            "fieldConfig": {
              "defaults": {
                "unit": "logs/s"
              }
            }
          },
          {
            "id": 5,
            "title": "Active Pods",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 18, "y": 8},
            "targets": [
              {
                "expr": "count(count by (pod) (rate({namespace=\"hipster-shop\"}[1m])))",
                "refId": "A",
                "datasource": {"type": "loki", "uid": "loki"}
              }
            ],
            "options": {
              "colorMode": "value"
            },
            "fieldConfig": {
              "defaults": {
                "unit": "short"
              }
            }
          },
          {
            "id": 6,
            "title": "Live Application Logs",
            "type": "logs",
            "gridPos": {"h": 12, "w": 24, "x": 0, "y": 12},
            "targets": [
              {
                "expr": "{namespace=\"hipster-shop\"}",
                "refId": "A",
                "datasource": {"type": "loki", "uid": "loki"}
              }
            ],
            "options": {
              "showTime": true,
              "showLabels": true,
              "sortOrder": "Descending",
              "wrapLogMessage": true
            }
          }
        ],
        "refresh": "10s",
        "time": {"from": "now-1h", "to": "now"},
        "timepicker": {},
        "schemaVersion": 38
      }
    }
